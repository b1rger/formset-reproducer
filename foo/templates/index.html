{% load render_form from formsetify %}
{% load static %}
<head>
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js" 
          integrity="sha384-H5SrcfygHmAuTDZphMHqBJLc3FhssKjG7w/CeCpFReSfwBWDTKpkzPP8c+cLsK+V"
          crossorigin="anonymous"></script>
  <script type="module" src="{% static 'formset/js/django-formset.js' %}"></script>
  <link rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"/>
    <script src="{% url 'javascript-catalog' %}"></script>
    <link href="{% static 'formset/css/bootstrap5-extra.css' %}" rel="stylesheet">
</head>
<body>
  <!-- uncomment to make the dialog work:
  <django-formset endpoint="{{ request.path }}" csrf-token="{{ csrf_token }}">
    {% render_form form "bootstrap" %}
  </django-formset>
  -->
  <button hx-get="/form" hx-target="#formdialog" onclick="formdialog.showModal()">click me</button>

  <dialog id="formdialog">
  </dialog>
</body>
